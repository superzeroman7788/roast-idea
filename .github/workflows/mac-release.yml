# 推一个 tag(如 v0.1.1)→ 构建 + 签名 + 公证 + 建 GitHub Release + 生成 updater 的 latest.json。
# 以后发版只需:bump 版本号 → 打 tag → push,本地什么都不用跑。
#
# ⚠️ 公证(notarization)拆成了独立步骤,不再让 tauri-action 黑盒等(它内部 notarytool --wait 无超时,
#    Apple 偶发卡住能挂 6 小时)。现在:tauri-action 只「构建 + 签名」(摘掉 APPLE_ID/PASSWORD/TEAM_ID
#    它就不公证),公证由「Notarize + staple」步骤显式跑 —— 带超时、打 submission id、Invalid 自动拉日志,
#    一眼能看出 Apple 端是 In Progress / Accepted / Invalid。
#
# 需要在仓库 Settings → Secrets and variables → Actions 里加这些 secret:
#   TAURI_SIGNING_PRIVATE_KEY           — ~/.tauri/roast.key 的内容(updater 验签私钥)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — 该私钥密码(没设就留空字符串)
#   APPLE_CERTIFICATE                   — Developer ID Application 证书导出的 .p12 的 base64
#   APPLE_CERTIFICATE_PASSWORD          — 上面 .p12 的密码
#   APPLE_SIGNING_IDENTITY              — "Developer ID Application: <名字> (<TeamID>)"
#   APPLE_ID                            — Apple ID 邮箱(ln5423696@gmail.com)
#   APPLE_PASSWORD                      — App 专用密码(appleid.apple.com 生成)
#   APPLE_TEAM_ID                       — Team ID
# 公开仓库 macOS runner 不计费。证书/密码只存在 GitHub Secrets,日志里不回显。

name: Mac Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # 也可在 Actions 页手动触发(测试用)

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write     # 建 Release / 重传 dmg 需要写权限
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: npm ci

      # tag 必须和 tauri.conf.json 的 version 一致,否则 updater 比对版本会错乱
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG" != "$CONF" ]; then
            echo "::error::tag v$TAG 与 tauri.conf.json version $CONF 不一致 —— 先 bump 版本再打 tag"
            exit 1
          fi

      # ① 构建 + 签名(★ 不公证):只给签名凭据,不给 APPLE_ID/PASSWORD/TEAM_ID,tauri-action 就跳过公证,绝不挂 6 小时。
      #    它仍负责:tauri build → Developer ID 签名(hardened runtime)→ updater minisign 签名 → 建 Release → 传 dmg/updater/latest.json。
      - name: Build + sign (no notarize)
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 40
        env:
          # 建 Release / 传 dmg 需要(tauri-action 必需;之前死在证书导入,没走到这一步才没暴露)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # updater 包验签(minisign)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 只给苹果「签名」凭据 —— 故意不给 APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID,让 tauri-action 不做公证
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ROAST ${{ github.ref_name }}"
          releaseBody: "桌面版自动构建。首次安装下载 .dmg;已安装的旧版打开即自动更新。"
          releaseDraft: false
          prerelease: false
          # universal:Intel + Apple Silicon 一个包通吃
          args: --target universal-apple-darwin

      # ② 公证 + staple(★ 独立、可观测):notarytool submit --wait --timeout,打出 submission id + 状态;
      #    Accepted → staple 进 dmg 再覆盖重传 + 改 Release 说明为「已公证」;
      #    非 Accepted → ★ 不阻断:已签名 dmg 照常留在 Release,说明里附 `xattr -cr` 首开指引,并拉 Apple 日志看原因;等账号侧通了下次自动补 staple。
      #    step 级 timeout-minutes 兜底:即便 Apple 端真卡住,40 分钟也会断,不会再 6 小时黑盒。
      - name: Notarize + staple DMG
        timeout-minutes: 40
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          DMG=$(find src-tauri/target -name "*.dmg" | head -n1)
          if [ -z "$DMG" ]; then echo "::error::没找到构建出的 .dmg"; exit 1; fi
          echo "DMG = $DMG"
          TAG="${GITHUB_REF_NAME}"
          set +e   # ★ 软失败:公证没过也不中断 —— 已签名的 dmg 照常留在 Release(附首开指引),Apple 通了下次自动补 staple

          echo "::group::notarytool submit --wait(最长 30 分钟)"
          OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m 2>&1)
          RC=$?
          echo "$OUT"
          echo "::endgroup::"

          SUBID=$(printf '%s\n' "$OUT" | grep -Eo '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1)
          STATUS=$(printf '%s\n' "$OUT" | grep -Eo 'status: [A-Za-z ]+' | tail -n1 | sed 's/status: //')
          echo "──────────────────────────────"
          echo "submission id : ${SUBID:-(未取到)}"
          echo "apple status  : ${STATUS:-(未取到)}  (notarytool exit=$RC)"
          echo "──────────────────────────────"

          if [ "$STATUS" = "Accepted" ]; then
            echo "✓ Apple 公证通过 → staple 票据进 dmg"
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG"
            echo "↻ 覆盖重传 stapled dmg 到 Release $TAG"
            gh release upload "$TAG" "$DMG" --clobber
            gh release edit "$TAG" --notes "桌面版自动构建 · 已通过 Apple 公证 ✅

          下载 .dmg → 拖进「应用程序」→ 双击打开即可。已安装旧版打开即自动更新。"
            echo "✓ 完成:dmg 已公证 + stapled(离线也不弹 Gatekeeper 警告)"
          else
            echo "::warning::公证未通过(status=${STATUS:-unknown},submission ${SUBID:-?})—— 不阻断,发布已签名版 + 首开指引。Apple 详细日志:"
            [ -n "$SUBID" ] && xcrun notarytool log "$SUBID" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID"
            gh release edit "$TAG" --notes "桌面版自动构建 · 已 Developer ID 签名(Apple 公证开通中,本版暂未公证)

          ⚠️ 首次打开:下载 .dmg → 拖进「应用程序」后,**终端跑一行**去掉下载隔离标记:
          \`\`\`
          xattr -cr /Applications/ROAST.app
          \`\`\`
          再双击打开(每台机器做一次即可)。等公证开通,之后的新版本不再需要这步。

          已安装旧版打开即自动更新。"
            echo "✓ 已发布签名版 dmg + 首开指引(公证待 Apple 侧开通后自动补)"
          fi
          exit 0
