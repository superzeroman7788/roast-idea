# 推一个 tag(如 v0.1.1)→ 自动构建 + 签名 + 公证 + 建 GitHub Release + 生成 updater 的 latest.json。
# 以后发版只需:bump 版本号 → 打 tag → push,本地什么都不用跑。
#
# 需要在仓库 Settings → Secrets and variables → Actions 里加这些 secret:
#   TAURI_SIGNING_PRIVATE_KEY           — ~/.tauri/roast.key 的内容(updater 验签私钥)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — 该私钥密码(没设就留空字符串)
#   APPLE_CERTIFICATE                   — Developer ID Application 证书导出的 .p12 的 base64
#   APPLE_CERTIFICATE_PASSWORD          — 上面 .p12 的密码
#   APPLE_SIGNING_IDENTITY              — "Developer ID Application: <名字> (<TeamID>)"
#   APPLE_ID                            — Apple ID 邮箱(ln5423696@gmail.com)
#   APPLE_PASSWORD                      — App 专用密码(appleid.apple.com 生成)
#   APPLE_TEAM_ID                       — Team ID
# 公开仓库 macOS runner 不计费。证书/密码只存在 GitHub Secrets,日志里不回显。

name: Mac Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # 也可在 Actions 页手动触发(测试用)

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write     # 建 Release 需要写权限
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: npm ci

      # tag 必须和 tauri.conf.json 的 version 一致,否则 updater 比对版本会错乱
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG" != "$CONF" ]; then
            echo "::error::tag v$TAG 与 tauri.conf.json version $CONF 不一致 —— 先 bump 版本再打 tag"
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          # updater 包验签(minisign)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 苹果分发签名 + 公证
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ROAST ${{ github.ref_name }}"
          releaseBody: "桌面版自动构建。首次安装下载 .dmg;已安装的旧版打开即自动更新。"
          releaseDraft: false
          prerelease: false
          # universal:Intel + Apple Silicon 一个包通吃
          args: --target universal-apple-darwin
