# 保活兜底:每 ~10 分钟 ping 一次 Render 的 /api/status,避免免费层 15 分钟闲置休眠 → 下次访问冷启动。
# 注意:GitHub Actions 定时器不可靠(高负载会延迟/跳过,实际可能 20-50 分钟才跑;仓库 60 天无提交会被自动禁用),
#       所以这只是【兜底/冗余】。主力请用外部托管定时器:cron-job.org 或 UptimeRobot 每 10 分钟 GET 同一个 URL(更准更稳)。
name: keepalive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/status (容忍冷启动那一分钟,重试 3 次)
        run: |
          URL="https://roast-idea.onrender.com/api/status"
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 90 "$URL") && [ "$code" = "200" ] && { echo "ok ($code)"; exit 0; }
            echo "attempt $i -> ${code:-conn-fail}, retrying in 30s..."; sleep 30
          done
          echo "keepalive failed after 3 attempts"; exit 1
